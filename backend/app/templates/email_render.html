<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; font-size: 11pt; color: #111; }
  .header-block { border: 1px solid #ccc; padding: 10px 12px; margin-bottom: 18px; background: #f7f7f7; }
  .header-row { margin: 2px 0; }
  .header-label { font-weight: bold; display: inline-block; width: 60px; }
  .body-text { white-space: pre-wrap; }
</style>
</head>
<body>
  <div class="header-block">
    <div class="header-row"><span class="header-label">From:</span> {{ sender }}</div>
    <div class="header-row"><span class="header-label">To:</span> {{ recipients_to|join(', ') }}</div>
    {% if recipients_cc %}
    <div class="header-row"><span class="header-label">Cc:</span> {{ recipients_cc|join(', ') }}</div>
    {% endif %}
    <div class="header-row"><span class="header-label">Sent:</span> {{ sent_at }}</div>
    <div class="header-row"><span class="header-label">Subject:</span> {{ subject }}</div>
  </div>
  {% if body_html %}
  <div class="body-html">{{ body_html|safe }}</div>
  {% else %}
  <div class="body-text">{{ body_text }}</div>
  {% endif %}
</body>
</html>
