<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; font-size: 12pt; color: #111; }
  h1 { font-size: 16pt; }
  table { border-collapse: collapse; margin-top: 12px; }
  td { padding: 4px 10px; vertical-align: top; }
  td.label { font-weight: bold; white-space: nowrap; }
</style>
</head>
<body>
  <h1>{{ full_name or "(no name)" }}</h1>
  <table>
    {% if company %}<tr><td class="label">Company</td><td>{{ company }}</td></tr>{% endif %}
    {% if title %}<tr><td class="label">Title</td><td>{{ title }}</td></tr>{% endif %}
    {% if emails %}<tr><td class="label">Email</td><td>{{ emails|join(', ') }}</td></tr>{% endif %}
    {% if phones %}<tr><td class="label">Phone</td><td>{{ phones|join(', ') }}</td></tr>{% endif %}
  </table>
</body>
</html>
